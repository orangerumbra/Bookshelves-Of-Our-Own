<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookshelves Of Our Own | 我们自己的书架</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav class="top-nav">
  <div class="nav-logo"><div class="nav-logo-icon">书</div><div class="nav-logo-text">Bookshelves Of Our Own</div></div>
  <div class="nav-actions">
    <div class="search-container">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="searchInput" placeholder="目录检索… (⌘K)">
      <button class="btn btn-ghost btn-sm" id="advBtn" title="高级搜索">⚙</button>
      <div class="adv-panel" id="advPanel">
        <label>书名</label><input id="aT" placeholder="按书名搜索">
        <label>作者</label><input id="aA" placeholder="按作者搜索">
        <label>评分 ≥</label><select id="aR"><option value="0">不限</option><option value="1">★</option><option value="2">★★</option><option value="3">★★★</option><option value="4">★★★★</option><option value="5">★★★★★</option></select>
        <label>感想关键词</label><input id="aN" placeholder="搜索阅读感想">
        <label>标签</label><input id="aTg" placeholder="按标签搜索">
        <label>阅读状态</label><select id="aS"><option value="">全部</option><option value="unread">未读</option><option value="reading">在读</option><option value="read">已读</option></select>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="clearAdv()">清除</button>
          <button class="btn btn-primary btn-sm" onclick="runAdv()">搜索</button>
        </div>
      </div>
    </div>
    <div id="authArea"></div>
    <button class="btn btn-secondary btn-sm" id="importBtn">↑ 导入</button>
    <button class="btn btn-secondary btn-sm" id="exportBtn">↓ 导出</button>
    <button class="btn btn-ghost btn-sm" id="saveBtn" title="保存 (⌘S)">💾</button>
  </div>
</nav>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="library">📚 图书馆</button>
  <button class="tab-btn" data-tab="stats">📊 统计</button>
</div>
<div class="tab-content active" id="tab-library">
  <div class="toolbar">
    <div class="toolbar-left"><span class="toolbar-title">大厅</span><span style="font-family:var(--fm);font-size:11px;color:var(--dm)" id="totalCount">共 0 本</span></div>
    <div class="toolbar-right"><button class="btn btn-primary" id="addShelfBtn">+ 添加书架</button></div>
  </div>
  <div class="library-container"><div class="shelves-grid" id="grid"></div></div>
</div>
<div class="tab-content" id="tab-stats">
  <div class="toolbar">
    <div class="toolbar-left"><span class="toolbar-title">年度统计</span></div>
    <div class="toolbar-right"><select class="form-select" id="statsYear" style="width:90px;padding:4px 8px;font-size:11px"></select></div>
  </div>
  <div class="library-container" id="statsBox"></div>
</div>
<div class="book-tooltip" id="tip"></div>
<div class="detail-backdrop" id="dbk"></div>
<div class="detail-panel" id="dpn">
  <div class="detail-cover" id="dcv"></div>
  <div class="detail-content" id="dct"></div>
  <div class="detail-actions">
    <button class="btn btn-primary" id="editBtn">✏ 编辑</button>
    <button class="btn btn-danger btn-sm" id="delBtn">删除</button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" id="closeBtn">关闭</button>
  </div>
</div>
<div class="modal-overlay" id="mOvl">
  <div class="modal"><div class="modal-header"><div class="modal-title" id="mTtl"></div><button class="btn btn-ghost btn-icon" onclick="closeModal()">✕</button></div>
  <div class="modal-body" id="mBdy"></div><div class="modal-footer" id="mFtr"></div></div>
</div>
<div class="toast-box" id="tBox"></div>
<input type="file" id="impFile" accept=".json" style="display:none">
<input type="file" id="covFile" accept="image/*" style="display:none">

<div class="confirm-overlay" id="cfmOvl"><div class="confirm-box"><div class="confirm-msg" id="cfmMsg"></div><div class="confirm-btns"><button class="btn btn-ghost" id="cfmNo">取消</button><button class="btn btn-danger" id="cfmYes">确定</button></div></div></div>
<script src="app.js"></script>

</body>
</html>
